<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);

  color: white;
  padding-bottom: 60px;
}
.header {
  background: rgba(0,0,0,0.4);
  padding: 20px; text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}
.header h1 { font-size: 1.6rem; font-weight: 900; margin-bottom: 4px; }
.header p { color: rgba(255,255,255,0.7); font-size: 0.85rem; }
.progress-bar-wrap { background: rgba(255,255,255,0.15); border-radius: 20px; height: 8px; margin: 12px 0 4px; }
.progress-bar-fill { height: 8px; border-radius: 20px; background: linear-gradient(90deg, #f39c12, #e67e22); transition: width 0.5s; }
.progress-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); }

.main { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

/* LESSON LIST */
#lesson-list .lesson-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 16px 18px;
  margin-bottom: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.2s;
}
#lesson-list .lesson-card:hover { background: rgba(255,255,255,0.14); }
#lesson-list .lesson-card.locked { opacity: 0.4; cursor: not-allowed; }
#lesson-list .lesson-card.done { border-color: #2ecc71; }
.lesson-num {
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1rem; flex-shrink: 0;
}
.lesson-card.done .lesson-num { background: #2ecc71; }
.lesson-card.locked .lesson-num { background: rgba(255,255,255,0.08); }
.lesson-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
.lesson-info p { font-size: 0.78rem; color: rgba(255,255,255,0.6); }
.lesson-badge { margin-left: auto; font-size: 1.2rem; flex-shrink: 0; }

/* LESSON VIEW */
#lesson-view { display: none; }
.back-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: white; border-radius: 20px; padding: 8px 18px;
  font-size: 0.85rem; cursor: pointer; margin-bottom: 18px;
}
.lesson-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 4px; }
.lesson-subtitle { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 20px; }

/* PHRASES */
.phrase-card {
  background: rgba(255,255,255,0.97); color: #1a1a2e;
  border-radius: 16px; padding: 16px 18px; margin-bottom: 12px;
}
.phrase-en { font-size: 1.05rem; font-weight: 800; margin-bottom: 4px; color: #0f3460; }
.phrase-es { font-size: 0.92rem; color: #555; margin-bottom: 6px; }
.phrase-pron { font-size: 0.82rem; color: #888; font-style: italic; }
.speak-btn {
  background: linear-gradient(135deg, #0f3460, #533483);
  color: white; border: none; border-radius: 20px;
  padding: 6px 16px; font-size: 0.8rem; cursor: pointer;
  margin-top: 8px; font-weight: 700;
}

/* QUIZ */
.quiz-card {
  background: rgba(255,255,255,0.97); color: #1a1a2e;
  border-radius: 18px; padding: 22px 18px; margin-bottom: 16px;
}
.quiz-q { font-size: 1rem; font-weight: 700; color: #0f3460; margin-bottom: 16px; line-height: 1.5; }
.quiz-opt {
  width: 100%; text-align: left; padding: 12px 16px;
  border: 2px solid #ddd; border-radius: 12px;
  background: white; color: #333; font-size: 0.95rem;
  cursor: pointer; margin-bottom: 8px; transition: all 0.15s;
  font-family: inherit;
}
.quiz-opt:hover { border-color: #0f3460; background: #f0f0ff; }
.quiz-opt.correct { border-color: #2ecc71; background: #f0fff4; color: #1a6b3a; font-weight: 700; }
.quiz-opt.wrong { border-color: #e74c3c; background: #fff0f0; color: #c0392b; }
.quiz-feedback { font-size: 0.9rem; font-weight: 700; margin-top: 10px; padding: 8px 12px; border-radius: 10px; }
.quiz-feedback.ok { background: #f0fff4; color: #1a6b3a; }
.quiz-feedback.bad { background: #fff0f0; color: #c0392b; }

.next-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #0f3460, #533483);
  color: white; border: none; border-radius: 14px;
  font-size: 1rem; font-weight: 800; cursor: pointer; margin-top: 8px;

  font-size: 0.95rem; color: rgba(255,255,255,0.8);
  margin-bottom: 8px;

  font-weight: 700; font-size: 0.9rem; cursor: pointer;
  background: rgba(255,255,255,0.15); color: white;

// ── PROGRESS ─────────────────────────────────────────────
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('angie_progress') || '{}'); } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('angie_progress', JSON.stringify(p)); }

let progress = loadProgress();
let currentLesson = null, currentTab = 'learn', quizIndex = 0, quizScore = 0, quizAnswered = false;

// ── RENDER LIST ───────────────────────────────────────────
function renderList() {
  progress = loadProgress();
  const done = Object.keys(progress).filter(k => progress[k] === 'done').length;
  document.getElementById('total-bar').style.width = (done/20*100) + '%';
  document.getElementById('total-label').textContent = done + ' de 20 lecciones completadas';

  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const isDone = progress[lesson.id] === 'done';
    const isLocked = i > 0 && progress[LESSONS[i-1].id] !== 'done';
    const card = document.createElement('div');
    card.className = 'lesson-card' + (isDone ? ' done' : '') + (isLocked ? ' locked' : '');
    card.innerHTML = `
      <div class="lesson-num">${lesson.id}</div>
      <div class="lesson-info">
        <h3>${lesson.title}</h3>
        <p>${lesson.desc}</p>
      </div>
      <div class="lesson-badge">${isDone ? '✅' : isLocked ? '🔒' : '▶️'}</div>`;
    if (!isLocked) card.onclick = () => openLesson(lesson);
    list.appendChild(card);
  });
}

// ── OPEN LESSON ───────────────────────────────────────────
function openLesson(lesson) {
  currentLesson = lesson;
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  document.getElementById('lv-title').textContent = lesson.title + ' • ' + lesson.titleEn;
  document.getElementById('lv-subtitle').textContent = lesson.desc;
  document.getElementById('lesson-list').style.display = 'none';
  document.getElementById('lesson-view').style.display = 'block';
  setTab('learn');
}

function showList() {
  document.getElementById('lesson-view').style.display = 'none';
  document.getElementById('lesson-list').style.display = 'block';
  renderList();
}

// ── TABS ──────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-learn').className = 'tab-btn' + (tab==='learn'?' active':'');
  document.getElementById('tab-quiz').className  = 'tab-btn' + (tab==='quiz' ?' active':'');
  document.getElementById('learn-section').style.display = tab==='learn' ? 'block' : 'none';
  document.getElementById('quiz-section').style.display  = tab==='quiz'  ? 'block' : 'none';
  if (tab === 'learn') renderLearn();
  if (tab === 'quiz')  renderQuiz();
}

// ── LEARN ─────────────────────────────────────────────────
function renderLearn() {
  const sec = document.getElementById('learn-section');
  sec.innerHTML = '';
  currentLesson.phrases.forEach(p => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <div class="phrase-en">${p.en}</div>
      <div class="phrase-es">${p.es}</div>
      <div class="phrase-pron">🔤 ${p.pron}</div>
      <button class="speak-btn" onclick="speak('${p.en.replace(/'/g,"\\'")}')">🔊 Escuchar</button>`;
    sec.appendChild(card);
  });
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

// ── QUIZ ──────────────────────────────────────────────────
function renderQuiz() {
  const sec = document.getElementById('quiz-section');
  const q = currentLesson.quiz;

  if (quizIndex >= q.length) {
    const pct = Math.round(quizScore / q.length * 100);
    const passed = pct >= 70;
    if (passed) {
      progress[currentLesson.id] = 'done';
      saveProgress(progress);
    }
    sec.innerHTML = `
      <div class="complete-card">
        <div style="font-size:3rem;margin-bottom:10px">${passed ? '🏆' : '📝'}</div>
        <h2>${passed ? '¡Excelente!' : 'Sigue practicando'}</h2>
        <p>${passed ? '¡Lección completada! Obtuviste ' + pct + '%' : 'Obtuviste ' + pct + '%. Necesitas 70% para pasar.'}</p>
        <button class="next-btn" onclick="${passed ? 'showList()' : 'restartQuiz()'}" style="margin-bottom:10px">
          ${passed ? '✅ Continuar' : '🔄 Intentar de nuevo'}
        </button>
        ${passed ? '' : '<button class="next-btn" style="background:rgba(0,0,0,0.2)" onclick="setTab(\'learn\')">📖 Repasar lección</button>'}
      </div>`;
    return;
  }

  const cur = q[quizIndex];
  sec.innerHTML = `
    <div class="score-display">Pregunta ${quizIndex+1} de ${q.length} • Puntos: ${quizScore}</div>
    <div class="quiz-card">
      <div class="quiz-q">${cur.q}</div>
      ${cur.opts.map((o,i) => `<button class="quiz-opt" id="opt-${i}" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      <div id="quiz-fb" style="display:none" class="quiz-feedback"></div>
    </div>
    <button class="next-btn" id="next-q" style="display:none" onclick="nextQuestion()">Siguiente →</button>`;
}

function answerQuiz(chosen) {
  if (quizAnswered) return;
  quizAnswered = true;
  const cur = currentLesson.quiz[quizIndex];
  const correct = chosen === cur.ans;
  if (correct) quizScore++;
  document.querySelectorAll('.quiz-opt').forEach((btn, i) => {
    btn.disabled = true;
    if (i === cur.ans) btn.classList.add('correct');
    else if (i === chosen && !correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-fb');
  fb.style.display = 'block';
  fb.className = 'quiz-feedback ' + (correct ? 'ok' : 'bad');
  fb.textContent = correct ? '✅ ¡Correcto!' : '❌ La respuesta correcta es: ' + cur.opts[cur.ans];
  document.getElementById('next-q').style.display = 'block';
}

function nextQuestion() {
  quizIndex++; quizAnswered = false;
  renderQuiz();
}

function restartQuiz() {
  quizIndex = 0; quizScore = 0; quizAnswered = false;
  renderQuiz();
}

// ── INIT ──────────────────────────────────────────────────
renderList();
</script>
